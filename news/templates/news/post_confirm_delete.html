{% extends 'default.html' %}

{% block content %}
<h2>Удаление поста</h2>
<p>Вы уверены, что хотите удалить "{{ object.title|censor }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Удалить</button>
    <a href="{% url 'news_detail' object.pk %}">Отмена</a>
</form>
{% endblock %}
