<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Новостной портал{% endblock %}</title>
</head>
<body>
    <header>
        <h1>Новости</h1>
        <nav>
            <a href="/news/">Все новости</a>
            {% if user.is_authenticated %}
                <span>Привет, {{ user.username }}!</span>
                <a href="/accounts/logout/">Выйти</a>
            {% else %}
                <a href="/accounts/login/">Войти</a>
                <a href="/accounts/signup/">Регистрация</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>© Новостной портал, 2025</p>
    </footer>
</body>
</html>
