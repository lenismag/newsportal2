<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Здравствуй, {{ user.username }}!</h2>
    <p>Новые статьи за неделю в категории "{{ category.name }}":</p>
    {% for post in posts %}
        <h3>{{ post.title }}</h3>
        <p>{{ post.text|slice:":50" }}...</p>
        <p><a href="http://127.0.0.1:8000/news/{{ post.pk }}/">Читать</a></p>
        <hr>
    {% endfor %}
</body>
</html>
